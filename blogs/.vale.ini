StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Blog

Packages = Google, write-good, proselint

[*.md]
BasedOnStyles = Vale, Google, write-good, proselint, Blog

# Allow first-person for personal blog voice
Google.FirstPerson = NO
Google.We = NO
Google.Parens = NO
Google.Exclamation = NO

# Disable overly strict suggestions
write-good.E-Prime = NO

title: "Networks of Trust"
orientation: landscape
style: sumi-e ink wash, minimalist
elements:
  - central_nodes: "five to seven soft, circular ink wash clusters in varying sizes, representing groups or teams"
  - connecting_pathways: "flowing, organic lines of varying weight linking the nodes, like water or ink diffusing through paper"
  - human_silhouettes: "tiny figures scattered throughout, some near nodes, some between them, suggesting movement and connection"
  - light_elements: "subtle warm glows at intersection points where pathways meet nodes, suggesting moments of understanding or exchange"
  - negative_space: "generous empty areas creating rhythm and breath, showing that connection happens through empty space, not just lines"
mood: calm, interconnected, flowing, organic growth
color_palette: soft blacks and grays with occasional warm amber at intersection points; mostly monochromatic with restraint
negative_prompt: "no logos, no text, no military imagery, no mechanical elements, no ships or warfare symbols, no photorealism, no rigid grids"
notes: "Emphasize fluidity and balance. Let the nodes breathe. The empty space between elements is as important as the elements themselves. Suggest connection through subtle proximity and flow, not through domination or hierarchy."
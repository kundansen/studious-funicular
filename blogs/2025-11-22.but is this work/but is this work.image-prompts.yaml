# Image Prompts for "But Is This Work?" Blog
# Visual Theme: Liminal spaces, boundaries dissolving, dawn/dusk transitions
# Style: East Asian ink wash painting (sumi-e) - soft edges, contemplative, slightly mysterious
# Symbolic Elements: Bamboo (flexibility), birds in flight (freedom), bridges over mist (transition), mountain paths at twilight (journey without destination)
# Generation Phase: Deferred - prompts only
#
# VISUAL GUARDRAILS (Oracle Prep Gate):
# - NO brand icons or logos (Slack, Teams, Microsoft, Google, etc.)
# - Notification accents: desaturated, non-specific colors (avoid platform-specific blues/greens)
# - Technology elements: abstract/generic (no recognizable UI elements)
# - Platform-agnostic: avoid Windows/Mac/mobile OS visual language
# - Alt-text intent included for each image (accessibility requirement)


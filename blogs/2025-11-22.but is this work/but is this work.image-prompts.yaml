  - "Screen glow should feel inviting, not ominous"
  - "Bamboo as witness to the ambiguity, bending with flexibility"
  - "Evoke the 11 PM coding session feeling - guilt meets joy"
alt_text_intent: "East Asian ink wash painting showing laptop on desk at twilight, screen glow mixing with fading daylight through window, bamboo plant bending between interior and exterior light, evoking the liminal threshold between work and life"

